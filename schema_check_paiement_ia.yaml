openapi: 3.0.3
info:
  title: API YÉKI
  version: 1.0.0
  description: Contrat backend↔frontend de la plateforme e-learning YÉKI. Enveloppe
    d'erreur, pagination et throttling communs décrits dans docs/API_FOUNDATIONS.md.
paths:
  /api/abonnement/statut/:
    get:
      operationId: api_abonnement_statut_retrieve
      description: 'Retourne le statut de l''abonnement premium de l''utilisateur
        connecté : `actif, type_abonnement, debut, fin, jours_restants`. Si aucun
        abonnement n''existe, retourne un statut inactif par défaut (`actif=False`,
        autres champs à `None`/`0`) plutôt qu''une erreur 404.'
      summary: Statut de l'abonnement premium
      tags:
      - paiement
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin-general/dashboard/:
    get:
      operationId: api_admin_general_dashboard_retrieve
      description: 'Retourne le tableau de bord complet réservé au profil `admin`
        : statistiques globales (nb_parcours, nb_departements, nb_cours, nb_apprenants,
        nb_enseignants, nb_lecons), la liste des parcours et des départements avec
        leurs compteurs, le top 10 des enseignants par score moyen, et la liste complète
        des enseignants.'
      summary: Tableau de bord de l'administrateur général
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin-general/enseignants/{profile_id}/activer/:
    post:
      operationId: api_admin_general_enseignants_activer_create
      description: Active le compte d'un enseignant (`is_active=True`) et lui envoie
        un email de confirmation avec ses identifiants. Réservé au profil `admin`.
        Renvoie 400 si l'utilisateur n'est pas un enseignant ou si son compte est
        déjà actif.
      summary: Activer un compte enseignant
      parameters:
      - in: path
        name: profile_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin-general/enseignants/{profile_id}/changer-type/:
    patch:
      operationId: api_admin_general_enseignants_changer_type_partial_update
      description: 'Change le type d''un enseignant (ex : enseignant → enseignant_principal).
        Corps attendu : `{"user_type": "enseignant_principal"}`. Le compte doit d''abord
        être actif (`is_active=True`). Réservé au profil `admin`.'
      summary: Changer le type d'un enseignant
      parameters:
      - in: path
        name: profile_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin-general/enseignants/{profile_id}/modifier/:
    patch:
      operationId: api_admin_general_enseignants_modifier_partial_update
      description: 'Modifie le `user_type` et/ou l''état `is_active` d''un enseignant
        en une seule requête. Corps attendu (au moins un champ) : `{"user_type": "enseignant_principal",
        "is_active": true}`. Envoie un email de confirmation en cas de changement
        de type ou d''activation. Réservé au profil `admin`.'
      summary: Modifier le type et/ou l'activation d'un enseignant
      parameters:
      - in: path
        name: profile_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin-general/enseignants/attente/:
    get:
      operationId: api_admin_general_enseignants_attente_retrieve
      description: 'Retourne la liste paginée des profils enseignants (tous types
        confondus) dont le compte est en attente d''activation (`is_active=False`).
        Réservé au profil `admin`. Chaque élément contient : id, username, email,
        nom, user_type, date_joined, bio, phone.'
      summary: Lister les enseignants en attente d'activation
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 'Numéro de page (défaut : 1).'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Taille de page (défaut : 20, maximum : 100).'
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RéponsePaginée:
                  value:
                    count: 57
                    next: http://api.yeki.cm/api/cours/?page=2
                    previous: null
                    results:
                    - '... voir le schéma de l''élément de la liste ...'
                  summary: Enveloppe de pagination standard (YekiPageNumberPagination)
          description: ''
  /api/admin-general/enseignants/search/:
    get:
      operationId: api_admin_general_enseignants_search_retrieve
      description: 'Recherche paginée des profils enseignants par texte libre, type,
        état d''activation, parcours, département, cours et plage de dates de création.
        Réservé au profil `admin`. Chaque élément contient : id, username, email,
        nom, user_type, is_active, date_joined, bio, phone, avatar.'
      summary: Rechercher des enseignants (filtres avancés)
      parameters:
      - in: query
        name: cours_id
        schema:
          type: integer
        description: Filtre par cours (enseignant principal ou secondaire).
      - in: query
        name: date_from
        schema:
          type: string
          format: date
        description: Date de création minimale (YYYY-MM-DD).
      - in: query
        name: date_to
        schema:
          type: string
          format: date
        description: Date de création maximale (YYYY-MM-DD).
      - in: query
        name: departement_id
        schema:
          type: integer
        description: Filtre par département (cadre).
      - in: query
        name: is_active
        schema:
          type: string
        description: Filtre par état d'activation ("true"/"false").
      - in: query
        name: page
        schema:
          type: integer
        description: 'Numéro de page (défaut : 1).'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Taille de page (défaut : 20, maximum : 100).'
      - in: query
        name: parcours_id
        schema:
          type: integer
        description: Filtre par parcours (admin du parcours).
      - in: query
        name: q
        schema:
          type: string
        description: Texte de recherche (nom, email, username, bio).
      - in: query
        name: user_type
        schema:
          type: string
        description: Filtre par type d'enseignant.
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RéponsePaginée:
                  value:
                    count: 57
                    next: http://api.yeki.cm/api/cours/?page=2
                    previous: null
                    results:
                    - '... voir le schéma de l''élément de la liste ...'
                  summary: Enveloppe de pagination standard (YekiPageNumberPagination)
          description: ''
  /api/admin/departements/{id}/update/:
    patch:
      operationId: api_admin_departements_update_partial_update
      description: Modifie un département. Réservé à l'enseignant_admin du parcours
        auquel appartient le département.
      summary: Modifier un département (enseignant admin)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - formation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDepartementUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDepartementUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDepartementUpdate'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Departement'
          description: ''
  /api/admin/olympiades/{id}/refuser/:
    post:
      operationId: api_admin_olympiades_refuser_create
      description: Refuser une olympiade (la garde visible mais marquée comme refusée)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/olympiades/{id}/valider/:
    post:
      operationId: api_admin_olympiades_valider_create
      description: |-
        POST /api/admin/olympiades/<pk>/valider/
        Body optionnel : { "refuser": true, "motif": "..." }

        Valide (publie) ou refuse une olympiade du parcours de l'admin.
        Valider = mettre Devoir.est_publie = True
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/olympiades/a-valider/:
    get:
      operationId: api_admin_olympiades_a_valider_retrieve
      description: |-
        GET /api/admin/olympiades/a-valider/
        Retourne les olympiades du parcours de l'admin qui attendent validation
        ou qui ont été refusées.
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/versions/:
    post:
      operationId: api_admin_versions_create
      description: Enregistre une nouvelle version pour une plateforme donnée et désactive
        automatiquement les anciennes versions actives de la même plateforme. Réservé
        aux utilisateurs staff (`is_staff=True`) ; les autres utilisateurs reçoivent
        une erreur 403.
      summary: Créer une nouvelle version d'application (admin)
      tags:
      - core
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppVersionCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppVersionCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppVersionCreate'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersion'
          description: ''
  /api/admin/versions/list/:
    get:
      operationId: api_admin_versions_list_list
      description: Liste paginée de toutes les versions enregistrées, triées par code
        de version décroissant. Réservé aux utilisateurs staff (`is_staff=True`) ;
        les autres utilisateurs reçoivent une erreur 403.
      summary: Lister toutes les versions d'application (admin)
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 'Numéro de page (défaut : 1).'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Taille de page (défaut : 20, maximum : 100).'
      tags:
      - core
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppVersionList'
              examples:
                RéponsePaginée:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - count: 57
                      next: http://api.yeki.cm/api/cours/?page=2
                      previous: null
                      results:
                      - '... voir le schéma de l''élément de la liste ...'
                  summary: Enveloppe de pagination standard (YekiPageNumberPagination)
          description: ''
  /api/apprenant/cursus/:
    get:
      operationId: api_apprenant_cursus_retrieve
      description: 'Retourne, paginés, les cours du niveau exact de l''apprenant connecté
        dans son cursus (profil.cursus), avec la progression de l''apprenant pour
        chacun. Réservé aux profils de type ''apprenant''. Chaque élément contient
        : id, title, description, enseignant_principal, lessons, assignments, icon,
        color, progression, niveau.'
      summary: Lister les cours du cursus de l'apprenant connecté
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 'Numéro de page (défaut : 1).'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Taille de page (défaut : 20, maximum : 100).'
      tags:
      - formation
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RéponsePaginée:
                  value:
                    count: 57
                    next: http://api.yeki.cm/api/cours/?page=2
                    previous: null
                    results:
                    - '... voir le schéma de l''élément de la liste ...'
                  summary: Enveloppe de pagination standard (YekiPageNumberPagination)
          description: ''
  /api/apprenant/departement/{id}/:
    get:
      operationId: api_apprenant_departement_retrieve
      description: GET /api/apprenant/departement/<pk>/ — detail complet
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/apprenant/departement/{id}/acces/:
    get:
      operationId: api_apprenant_departement_acces_retrieve
      description: |-
        GET /api/apprenant/departement/<pk>/acces/
        Vérifie si l'apprenant a accès au département.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/apprenant/formations/:
    get:
      operationId: api_apprenant_formations_retrieve
      description: |-
        GET /api/apprenant/prepa-concours/   → type='prepa' (concours)
        GET /api/apprenant/formations/       → type='formation' (formations)

        Retourne les concours ou formations accessibles selon le niveau de l'apprenant.
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/apprenant/lecon/{lecon_id}/like/:
    get:
      operationId: api_apprenant_lecon_like_retrieve
      description: Retourne si l'utilisateur connecté a liké la leçon, ainsi que le
        nombre total de likes de la leçon.
      summary: Vérifier si l'apprenant a aimé une leçon
      parameters:
      - in: path
        name: lecon_id
        schema:
          type: integer
        required: true
      tags:
      - formation
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
    post:
      operationId: api_apprenant_lecon_like_create
      description: 'Bascule (toggle) le like de l''apprenant connecté sur une leçon
        : ajoute le like s''il n''existe pas, le retire sinon. Réservé aux profils
        de type ''apprenant''.'
      summary: Aimer / retirer son like sur une leçon
      parameters:
      - in: path
        name: lecon_id
        schema:
          type: integer
        required: true
      tags:
      - formation
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/apprenant/lectures-recentes/:
    get:
      operationId: api_apprenant_lectures_recentes_retrieve
      description: 'Retourne, paginées et triées par dernière consultation, les leçons
        en cours de progression (non terminées) de l''apprenant connecté, avec le
        temps estimé restant. Chaque élément contient : lecon_id, lecon_titre, cours_id,
        cours_titre, cours_color, cours_icon, module_titre, pourcentage, derniere_vue,
        mins_restants.'
      summary: Lister les lectures récentes et non terminées de l'apprenant
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 'Numéro de page (défaut : 1).'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Taille de page (défaut : 20, maximum : 100).'
      tags:
      - formation
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RéponsePaginée:
                  value:
                    count: 57
                    next: http://api.yeki.cm/api/cours/?page=2
                    previous: null
                    results:
                    - '... voir le schéma de l''élément de la liste ...'
                  summary: Enveloppe de pagination standard (YekiPageNumberPagination)
          description: ''
  /api/apprenant/marquer-lecon/:
    post:
      operationId: api_apprenant_marquer_lecon_create
      description: 'Met à jour (ou crée) la progression de l''apprenant connecté sur
        une leçon. Corps attendu : `{"lecon_id": <int>, "pourcentage": <0-100>}`.
        La leçon est marquée terminée à partir de 90%.'
      summary: Enregistrer la progression de visionnage d'une leçon
      tags:
      - formation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/apprenant/prepa-concours/:
    get:
      operationId: api_apprenant_prepa_concours_retrieve
      description: |-
        GET /api/apprenant/prepa-concours/   → type='prepa' (concours)
        GET /api/apprenant/formations/       → type='formation' (formations)

        Retourne les concours ou formations accessibles selon le niveau de l'apprenant.
      tags:
      - api
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/change-password/:
    post:
      operationId: api_auth_change_password_create
      description: 'Change le mot de passe de l''utilisateur authentifié. Corps attendu
        : `{"old_password": "...", "new_password": "..."}`. Le nouveau mot de passe
        doit contenir au moins 8 caractères. Renouvelle le token d''authentification
        et le retourne dans la réponse.'
      summary: Changer son mot de passe (utilisateur connecté)
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/forgot-password/:
    post:
      operationId: api_auth_forgot_password_create
      description: 'Envoie par email un code OTP à 6 chiffres (valable 10 minutes)
        permettant de réinitialiser le mot de passe. Corps attendu : `{"email": "..."}`.
        La réponse est volontairement générique (200) même si l''email n''existe pas,
        afin de ne pas révéler les comptes existants. Limité à 3 demandes par 10 minutes
        (anti-abus, CDC_BACKEND §2.5). En mode DEBUG, le code est renvoyé directement
        dans la réponse si l''envoi d''email échoue.'
      summary: Demander un code de réinitialisation de mot de passe
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Authentifie un utilisateur avec son identifiant et son mot de passe
        et retourne un token d'authentification, son rôle et ses informations de base.
        Renvoie 403 si le compte enseignant est en attente de validation par l'administrateur.
        Limité à 5 tentatives par minute (anti brute-force, CDC_BACKEND §2.5).
      summary: Se connecter
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Supprime le token d'authentification de l'utilisateur connecté.
      summary: Se déconnecter
      tags:
      - accounts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      description: Crée un nouveau compte (apprenant ou enseignant selon les champs
        fournis) et retourne un token d'authentification immédiatement utilisable,
        ainsi que le rôle et les informations de base de l'utilisateur créé.
      summary: Créer un compte utilisateur
      tags:
      - accounts
      requestBody:
        content:
          application/json:
