  /api/check-update/:
    get:
      operationId: api_check_update_retrieve
      description: Compare `current_version` (obligatoire) à la dernière version active
        de la plateforme et indique si une mise à jour est disponible. Accessible
        sans authentification.
      summary: Vérifier la disponibilité d'une mise à jour
      parameters:
      - in: query
        name: current_version
        schema:
          type: integer
        description: Code de version actuellement installé.
        required: true
      - in: query
        name: platform
        schema:
          type: string
        description: 'Plateforme cible : ''android'' (défaut), ''ios'' ou ''web''.'
      tags:
      - core
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                MiseÀJourDisponible:
                  value:
                    update_available: true
                    version:
                      id: 3
                      platform: android
                      version_code: 12
                      version_name: v1.2.0
                      download_url: https://cdn.yeki.cm/app.apk
                      changelog: Corrections de bugs.
                      min_version_code: 10
                      force_update: false
                      is_active: true
                  summary: Réponse 200 — mise à jour disponible
                ÀJour:
                  value:
                    update_available: false
                    message: Vous utilisez déjà la dernière version.
                  summary: Réponse 200 — déjà à jour
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ParamètreManquant:
                  value:
                    detail: current_version est requis
                  summary: Réponse 400 — current_version absent ou invalide
          description: ''
