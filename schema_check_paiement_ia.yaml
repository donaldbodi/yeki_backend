  /api/forum/{room}/messages/:
    get:
      operationId: api_forum_messages_retrieve
      description: Mécanisme de repli au sondage (polling) remplaçant le temps réel
        WebSocket, non supporté par l'hébergeur PythonAnywhere (voir docs/FORUM_TEMPS_REEL.md).
        Le client interroge périodiquement cet endpoint en passant le paramètre `since`
        (date/heure ISO 8601 de la dernière synchronisation) pour récupérer uniquement
        les nouvelles questions et les identifiants des questions ayant reçu de nouvelles
        réponses depuis cette date. Sans `since`, retourne l'état complet de la room.
        `room` est soit l'identifiant numérique d'un cours, soit le littéral 'global'.
        Vue volontairement non paginée (usage en petits deltas incrémentaux, pas en
        listing).
      summary: Sondage incrémental des nouveaux messages du forum
      parameters:
      - in: path
        name: room
        schema:
          type: string
        required: true
      - in: query
        name: since
        schema:
          type: string
          format: date-time
        description: Date/heure ISO 8601 depuis laquelle récupérer les nouveautés.
          Absent = renvoie tout l'historique de la room.
      tags:
      - forum
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                NouveautésDepuis`since`:
                  value:
                    nouvelles_questions:
                    - '... voir QuestionForumListSerializer ...'
                    reponses_recentes_ids:
                    - 12
                    - 45
                  summary: Réponse 200
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Paramètre`since`Invalide:
                  value:
                    detail: 'Paramètre ''since'' invalide (attendu : datetime ISO
                      8601).'
                  summary: Réponse 400
          description: ''
