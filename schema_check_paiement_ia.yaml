      description: |-
        Crée une transaction CinetPay (Mobile Money MTN/Orange ou carte) et retourne l'URL de paiement à ouvrir côté client. Utilisé pour recharger le wallet, accéder à un département, s'inscrire à une olympiade ou souscrire un abonnement premium (mensuel/annuel). La transaction est créée avec le statut `pending` ; elle sera confirmée de façon asynchrone par le webhook `CinetPayWebhookView`.

        Réponse 200 : `{reference, payment_url, status, message}`.
        Limité par `throttle_scope='paiement'` (anti-spam).
