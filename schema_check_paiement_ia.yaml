  /api/paiements/cinetpay/notify/:
    post:
      operationId: api_paiements_cinetpay_notify_create
      description: |-
        **Webhook serveur-à-serveur** appelé directement par la plateforme CinetPay après le traitement d'un paiement — ce n'est PAS un endpoint destiné à être appelé par un utilisateur final ou l'app mobile/web Yéki. Volontairement sans authentification utilisateur (`AllowAny`, `authentication_classes=[]`) puisque CinetPay ne porte pas de token Yéki, et sans `throttle_scope` (le volume est dicté par CinetPay, pas par un client abusif) — voir docs/API_FOUNDATIONS.md pour le contexte exact de ce choix.

        Selon le statut reçu (`cpm_result`/`status`), met à jour la transaction et, en cas de succès, crédite le wallet, active l'abonnement premium ou confirme l'inscription à l'olympiade concernée. Réponse 200 : `{status: 'ok'|'already_processed'}`.
      summary: Webhook de notification CinetPay (serveur à serveur)
      tags:
      - paiement
      security:
